<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.socket.io; script-src 'self' 'unsafe-inline' https://cdn.socket.io; style-src 'self' 'unsafe-inline'; connect-src 'self' https://nype.onrender.com wss://nype.onrender.com http://localhost:3000 ws://localhost:3000;">
    <title>Nype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <h1 class="logo">Nype</h1>
        <div id="auth-box">
            <input id="username-input" placeholder="Username">
            <input id="password-input" type="password" placeholder="Password">
            <div class="auth-buttons">
                <button onclick="loginUser()">Sign In</button>
                <button onclick="registerUser()" class="secondary">Register</button>
            </div>
        </div>
    </div>

    <div id="app-container" style="display:none">
        <div id="topbar">
            <span>Nype</span>
            <div class="top-actions">
                <button onclick="toggleSettings()">⚙️</button>
            </div>
        </div>
        
        <div id="container">
            <div id="sidebar">
                <div class="user-profile">
                    <img id="my-pfp" src="" onclick="changePFP()">
                    <span id="display-name">User</span>
                </div>
                <div class="sidebar-header">
                    <span>Contacts</span>
                    <button onclick="openContactModal()">+</button>
                </div>
                <div id="contacts-list"></div>
            </div>

            <div id="no-chat-selected">
                <div class="placeholder-content">
                    <h2 class="logo" style="font-size: 32px;">Nype</h2>
                    <p>Select a contact to start messaging</p>
                </div>
            </div>

            <div id="main" style="display:none">
                <div id="chat-header">
                    <span id="active-contact-name">Name</span>
                    <button onclick="startCall()" class="call-btn">📞 Call</button>
                </div>
                <div id="chat"></div>
                <div id="input-area">
                    <input id="msg-input" placeholder="Type a message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

    <div id="call-screen">
    <h1>Calling...</h1>
    <button onclick="endCall()" style="background: red; color: white;">End Call</button>
</div>
    </div>

    <div id="contact-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3>Add Contact</h3>
            <input id="contact-username-input" placeholder="Enter username...">
            <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
                <button onclick="confirmAddContact()">Add</button>
                <button onclick="closeContactModal()" class="secondary">Cancel</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3>Settings</h3>
            <button onclick="resetAllData()" class="danger-btn">Reset All Data</button>
            <button onclick="toggleSettings()">Close</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="app.js"></script> 
</body>
</html>
